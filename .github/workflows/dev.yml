name: Dev publish

# Publishes a snapshot image to Docker Hub on every push to `development`.
# sbt-dynver's role (unique per-commit versions) is played here by the short
# commit SHA. Skipped — not failed — until the Docker Hub secrets are configured,
# so dev CI stays green until they are added. Never runs on PRs or on main.
on:
  push:
    branches:
      - development

concurrency:
  group: dev-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish:
    name: Build & push snapshot image
    runs-on: ubuntu-latest
    # 'true' only when Docker Hub secrets are configured.
    env:
      DOCKERHUB_ENABLED: ${{ secrets.DOCKER_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      # Gate: a red commit never produces a snapshot image. Deps-only install
      # (package checked from src) — see ci.yml for why.
      - name: Lint, type-check & test (gate)
        run: |
          python -m pip install --upgrade pip
          pip install httpx numpy pillow ruff mypy pytest
          ruff check src tests
          mypy -p argus
          pytest -q

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_ENABLED == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # Snapshot tag only — `latest` is left untouched (releases move that).
      - name: Build & push development snapshot image
        if: env.DOCKERHUB_ENABLED == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: calvinference/argus-tagger:dev-${{ github.sha }}
