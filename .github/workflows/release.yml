name: Release

# Triggers only on SemVer release tags (vMAJOR.MINOR.PATCH). Malformed tags
# such as `v1.2` or `release-1` do not match this pattern and never start a
# release.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write   # create the GitHub Release

jobs:
  release:
    name: Test, Publish image & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      # Gate: a red commit at the release tag aborts here, before anything is
      # published.
      # Deps-only install (package checked from src) — see ci.yml for why.
      - name: Lint, type-check & test (release gate)
        run: |
          python -m pip install --upgrade pip
          pip install httpx numpy pillow ruff mypy pytest
          ruff check src tests
          mypy -p argus
          pytest -q

      # Fails loudly if the secrets are missing or invalid rather than silently
      # skipping the image push — a release without an image is a failure.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build and push docker.io/calvinference/argus-tagger:<version> and :latest.
      - name: Build & push image (:version and :latest)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            calvinference/argus-tagger:${{ github.ref_name }}
            calvinference/argus-tagger:latest

      # Last step, so a GitHub Release is never created without the image having
      # been published first.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes --title "${GITHUB_REF_NAME}"
